<!DOCTYPE html>
<html>
<head>
  <title>Lead form</title>
</head>
<body>
  <h2>Get in Touch</h2>
<p>Please fill out the form and we’ll contact you shortly.</p>

  <form id="volunteerForm">
    <input type="text" id="name" placeholder="Full Name" required /><br><br>

  <input type="email" id="email" placeholder="Email Address" required /><br><br>

  <input type="tel" id="phone" placeholder="Phone Number" required /><br><br>

  <textarea id="message" placeholder="How can we help you?"></textarea><br><br>

    <button type="submit">Submit Lead</button>
  </form>

  <script>
document.getElementById("volunteerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    username: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    message: document.getElementById("message").value
  };

  try {
    const response = await fetch("https://deltarisingfoundation--obi.sandbox.my.salesforce.com/services/apexrest/bluesky/webhookservices/apexrest/bluesky/webhook", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer MY_SECRET_TOKEN"
      },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      window.location.href = "success.html";
    } else {
      window.location.href = "error.html";
    }

  } catch (error) {
    window.location.href = "error.html";
  }
});
</script>
